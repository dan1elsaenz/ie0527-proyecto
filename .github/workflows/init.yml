name: Initialize Repository

on:
  push:
    branches: [main]

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if initialization needed
        id: check
        run: |
          if grep -q "{{REPO_NAME}}" README.md; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Replace placeholders in README
        if: steps.check.outputs.needed == 'true'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_DESC="${{ github.event.repository.description }}"

          sed -i "s/{{REPO_NAME}}/$REPO_NAME/g" README.md
          sed -i "s/{{REPO_DESC}}/${REPO_DESC:-Sin descripción}/g" README.md

      - name: Delete this workflow
        if: steps.check.outputs.needed == 'true'
        run: |
          rm .github/workflows/init.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

      - name: Commit and push
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: initialize README and remove setup workflow"
          git push
